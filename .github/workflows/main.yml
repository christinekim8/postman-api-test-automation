name: API Automation CI

on:
  push:
    branches: [ "main" ]

jobs:
  api-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Fetch the latest code from the repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Setup Node.js environment
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. Install project dependencies and reporters
    - name: Install Dependencies
      run: |
        npm install
        npm install -g newman newman-reporter-allure allure-commandline

    # 4. Start the server and execute tests with Allure reporter
    - name: Run Server and Test
      run: |
        node server.js &
        sleep 5
        # Execute tests and generate results in 'allure-results' folder
        newman run tests/postman_collection.json \
          -e tests/postman_environment.json \
          -r allure \
          --reporter-allure-export ./allure-results

    # 5. Generate the final Allure HTML report
    - name: Generate Allure Report
      if: always()
      run: |
        allure generate ./allure-results --clean -o allure-report

    # 6. Deploy the report to GitHub Pages (gh-pages branch)
    - name: Deploy to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report