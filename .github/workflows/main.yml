name: API Automation CI (Docker Edition)

on:
  push:
    branches: [ "main" ]

jobs:
  api-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Fetch the source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js (Required to generate the Allure report later)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. [PRO TRICK] Automatically switch to Docker network address
      # This replaces 'localhost' with 'api-server' only during the CI run.
      # Your local file remains unchanged!
      - name: Update baseUrl for Docker Network
        run: |
          sed -i 's/localhost:3000/api-server:3000/g' tests/postman_environment.json

      # 4. Build and Run containers using Docker Compose
      # --exit-code-from: Ensures the CI job fails if any test fails
      - name: Run Tests with Docker Compose
        run: |
          docker compose up --build --exit-code-from api-tester

      # 5. Generate Allure Report from the results mapped via Volumes
      - name: Install Allure CLI & Generate Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate ./reports/allure-results --clean -o allure-report

      # 6. Deploy the final report to GitHub Pages
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report